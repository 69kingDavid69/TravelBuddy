services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PIPER_VOICES_DIR=/data/voices
      - CHROMA_DIR=/data/chroma
      - ALLOWED_ORIGINS=http://localhost:8080
    volumes:
      # Bind-mount ./data so voice files and Chroma DB persist between runs
      # without needing a named volume. Run scripts/setup_local.sh first to
      # populate ./data/voices/ with the Piper voice models.
      - ./data:/data
    restart: unless-stopped
